name: Release (signed)

# Builds the published binaries on a version tag, submits the Windows build to
# SignPath for signing, and attaches the SIGNED artifact to the GitHub Release.
#
# Signing happens here (on a tag), NOT in build.yml (on every push/PR), because
# the SignPath Foundation requires each release to be manually approved before
# signing. See the "Code signing policy" section in README.md.
#
# ── Before this works, set these in the repo (Settings → Secrets/Variables) ──
#   Secret   SIGNPATH_API_TOKEN          – API token from your SignPath account
#   Variable SIGNPATH_ORGANIZATION_ID    – GUID of your SignPath organization
#   Variable SIGNPATH_PROJECT_SLUG       – e.g. "Genie5"
#   Variable SIGNPATH_SIGNING_POLICY     – e.g. "release-signing"  (Foundation tier)
# The project + an "artifact configuration" must first be created in the SignPath
# web UI; the artifact-configuration-slug below must match it.

on:
  push:
    tags: ["v*"]          # e.g. v5.0.0-alpha.1
  workflow_dispatch:       # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to create/update the GitHub Release
  id-token: write          # SignPath uses GitHub's OIDC token for origin verification

jobs:
  notes:
    name: Extract this tag's section from RELEASE_NOTES.md
    runs-on: ubuntu-latest
    # RELEASE_NOTES.md is a cumulative changelog (every version stacked, newest
    # on top). Publishing the whole file as the release body made every Release
    # page show its version PLUS all older ones. This job slices out only the
    # section whose heading matches the current tag and publishes that as the
    # body — keeping the in-repo file as the full changelog. Runs on Linux so
    # awk/sed are guaranteed; the result is shared with every platform job.
    steps:
      - uses: actions/checkout@v4
      - name: Slice out the current version's notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          # Capture from the "# Genie 5 … <tag>" heading down to (but not
          # including) the next top-level "# Genie 5" heading.
          awk -v tag="$tag" '
            $0 ~ ("^# Genie 5 .* " tag "$") { capture=1; print; next }
            capture && /^# Genie 5 / { exit }
            capture { print }
          ' RELEASE_NOTES.md > RELEASE_BODY.md
          # Trim trailing blank lines and the "---" section separator.
          awk '{ a[NR]=$0 }
               END { n=NR
                     while (n>0 && (a[n] ~ /^[[:space:]]*$/ || a[n] ~ /^---[[:space:]]*$/)) n--
                     for (i=1;i<=n;i++) print a[i] }' RELEASE_BODY.md > RELEASE_BODY.trimmed
          mv RELEASE_BODY.trimmed RELEASE_BODY.md
          if [ ! -s RELEASE_BODY.md ]; then
            echo "::error::No RELEASE_NOTES.md section found for tag $tag — add a '# Genie 5 — $tag' heading before tagging."
            exit 1
          fi
          echo "----- release body for $tag -----"
          cat RELEASE_BODY.md
      - name: Upload extracted body
        uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: RELEASE_BODY.md
          if-no-files-found: error

  publish:
    name: Publish self-contained win-x64
    runs-on: windows-latest
    outputs:
      unsigned-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained win-x64
        run: |
          dotnet publish src/Genie.App/Genie.App.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/win-x64

      # SignPath pulls the binary from a GitHub Actions artifact, so upload it.
      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: genie-win-x64-unsigned
          path: publish/win-x64/Genie.exe
          if-no-files-found: error

  velopack:
    name: Velopack package + upload to Release
    runs-on: windows-latest
    needs: [publish, notes]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download unsigned artifact from publish job
        uses: actions/download-artifact@v4
        with:
          name: genie-win-x64-unsigned
          path: publish/win-x64

      - name: Strip leading 'v' from tag name
        id: ver
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download previous Velopack releases (for delta packages)
        # First release will fail this step (no prior assets) — that's OK,
        # the resulting full.nupkg is still valid. Subsequent releases get
        # binary-diff deltas pulled from the most recent assets.
        shell: pwsh
        continue-on-error: true
        run: |
          vpk download github `
            --repoUrl https://github.com/GenieClient/Genie5 `
            --outputDir velopack-releases `
            --pre

      - name: Velopack pack
        shell: pwsh
        run: |
          vpk pack `
            --packId Genie5 `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir publish/win-x64 `
            --mainExe Genie.exe `
            --icon src/Genie.App/Assets/app.ico `
            --outputDir velopack-releases

      - name: Rename Windows installers (numbered prefix for clarity in Release page)
        shell: pwsh
        # User-facing installers get a numbered prefix so the Release page asset
        # list shows them in a predictable order (Windows first since most
        # testers are on Windows). Velopack feed files (.nupkg, RELEASES,
        # *.json) MUST keep their existing names — the in-app updater fetches
        # them at fixed URL patterns and would break if renamed.
        run: |
          cd velopack-releases
          if (Test-Path Genie5-win-Setup.exe)     { Move-Item Genie5-win-Setup.exe     "01-Windows-Genie5-Setup.exe" }
          if (Test-Path Genie5-win-Portable.zip)  { Move-Item Genie5-win-Portable.zip  "01-Windows-Genie5-Portable.zip" }

      - name: Download extracted release body
        uses: actions/download-artifact@v4
        with:
          name: release-body

      - name: Attach Velopack assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          # Velopack produces: Setup.exe, *-full.nupkg, *-delta.nupkg (when
          # prior versions exist), Portable.zip, RELEASES, releases.win.json,
          # assets.win.json. Attach everything in the output dir.
          files: velopack-releases/*
          fail_on_unmatched_files: true
          generate_release_notes: false   # auto-gen off
          body_path: RELEASE_BODY.md       # this tag's section only (see notes job)

  velopack-linux:
    name: Velopack package — Linux x64
    runs-on: ubuntu-latest
    needs: notes
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish self-contained linux-x64
        run: |
          dotnet publish src/Genie.App/Genie.App.csproj \
            -c Release -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/linux-x64

      - name: Strip leading 'v' from tag name
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download previous Velopack releases (for delta packages)
        continue-on-error: true
        run: |
          vpk download github \
            --repoUrl https://github.com/GenieClient/Genie5 \
            --outputDir velopack-releases \
            --pre

      - name: Velopack pack
        run: |
          vpk pack \
            --packId Genie5 \
            --packVersion ${{ steps.ver.outputs.version }} \
            --packDir publish/linux-x64 \
            --mainExe Genie \
            --icon src/Genie.App/Assets/app.png \
            --outputDir velopack-releases

      - name: Rename Linux installers (numbered prefix for clarity)
        # See the Windows job's rename step for the rationale: user-facing
        # installers get a numbered prefix; Velopack feed files (.nupkg,
        # RELEASES, *.json) keep their existing names because the in-app
        # updater fetches them at fixed URLs.
        run: |
          cd velopack-releases
          [ -f Genie5.AppImage ] && mv Genie5.AppImage "04-Linux-Genie5.AppImage" || true

      - name: Download extracted release body
        uses: actions/download-artifact@v4
        with:
          name: release-body

      - name: Attach Velopack Linux assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          # Velopack on Linux produces: Genie5.AppImage, *-linux-full.nupkg,
          # RELEASES-linux, releases.linux.json. Per-platform feeds coexist
          # with Windows/macOS feeds on the same Release page; the in-app
          # updater reads only its own platform's manifest.
          files: velopack-releases/*
          fail_on_unmatched_files: true
          generate_release_notes: false
          body_path: RELEASE_BODY.md

  velopack-osx-arm64:
    name: Velopack package — macOS Apple Silicon (arm64)
    runs-on: macos-latest
    needs: notes
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish self-contained osx-arm64
        run: |
          dotnet publish src/Genie.App/Genie.App.csproj \
            -c Release -r osx-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/osx-arm64

      - name: Strip leading 'v' from tag name
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download previous Velopack releases (for delta packages)
        continue-on-error: true
        run: |
          vpk download github \
            --repoUrl https://github.com/GenieClient/Genie5 \
            --outputDir velopack-releases \
            --pre

      - name: Velopack pack
        run: |
          vpk pack \
            --packId Genie5 \
            --packVersion ${{ steps.ver.outputs.version }} \
            --packDir publish/osx-arm64 \
            --mainExe Genie \
            --bundleId com.genieclient.genie5 \
            --icon src/Genie.App/Assets/app.icns \
            --outputDir velopack-releases

      - name: Build drag-install .dmg from the packed .app
        # Velopack ships macOS as a .pkg installer + a Portable .zip (a zipped
        # .app); it does not emit a .dmg. Wrap that same .app in a drag-install
        # .dmg so Mac users get the familiar "drag to Applications" flow. Runs
        # before the rename step so the Velopack Portable .zip still has its
        # deterministic `vpk pack` name. The numbered .dmg is then picked up by
        # the existing `velopack-releases/*` attach glob.
        shell: bash
        run: |
          set -euo pipefail
          cd velopack-releases
          zip="Genie5-osx-Portable.zip"
          [ -f "$zip" ] || { echo "::error::expected $zip from vpk pack"; exit 1; }
          work="$(mktemp -d)"; stage="$(mktemp -d)"; tmp="$(mktemp -d)"
          unzip -q "$zip" -d "$work"
          app="$(find "$work" -maxdepth 2 -name '*.app' | head -1)"
          [ -n "$app" ] || { echo "::error::no .app inside $zip"; exit 1; }
          cp -R "$app" "$stage/"
          ln -s /Applications "$stage/Applications"
          # Two-step UDRO -> UDZO: direct UDZO creation intermittently fails
          # ("No space left on device") reading a freshly built bundle; the
          # convert path is reliable and yields an identical compressed image.
          hdiutil create -volname "Genie5" -srcfolder "$stage" -ov -format UDRO "$tmp/udro.dmg"
          hdiutil convert "$tmp/udro.dmg" -format UDZO -o "02-macOS-Apple-Silicon-Genie5.dmg"
          echo "Built $(pwd)/02-macOS-Apple-Silicon-Genie5.dmg"

      - name: Rename macOS arm64 installers (numbered prefix for clarity)
        # See the Windows job's rename step for the rationale.
        run: |
          cd velopack-releases
          [ -f Genie5-osx-Setup.pkg    ] && mv Genie5-osx-Setup.pkg    "02-macOS-Apple-Silicon-Genie5-Setup.pkg" || true
          [ -f Genie5-osx-Portable.zip ] && mv Genie5-osx-Portable.zip "02-macOS-Apple-Silicon-Genie5-Portable.zip" || true

      - name: Download extracted release body
        uses: actions/download-artifact@v4
        with:
          name: release-body

      - name: Attach Velopack macOS arm64 assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          # macOS arm64 (Apple Silicon, Macs from late 2020 onward).
          # Unsigned: first-time users must right-click → Open or run
          # `xattr -d com.apple.quarantine /Applications/Genie.app`.
          # Apple Developer ID notarization is deferred until post-alpha.
          files: velopack-releases/*
          fail_on_unmatched_files: true
          generate_release_notes: false
          body_path: RELEASE_BODY.md

  velopack-osx-x64:
    name: Velopack package — macOS Intel (x64)
    runs-on: macos-latest
    needs: notes
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish self-contained osx-x64
        run: |
          dotnet publish src/Genie.App/Genie.App.csproj \
            -c Release -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/osx-x64

      - name: Strip leading 'v' from tag name
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download previous Velopack releases (for delta packages)
        continue-on-error: true
        run: |
          vpk download github \
            --repoUrl https://github.com/GenieClient/Genie5 \
            --outputDir velopack-releases \
            --pre

      - name: Velopack pack
        run: |
          vpk pack \
            --packId Genie5 \
            --packVersion ${{ steps.ver.outputs.version }} \
            --packDir publish/osx-x64 \
            --mainExe Genie \
            --bundleId com.genieclient.genie5 \
            --channel osx-x64 \
            --icon src/Genie.App/Assets/app.icns \
            --outputDir velopack-releases

      - name: Build drag-install .dmg from the packed .app
        # See the arm64 job for rationale. Intel channel uses the
        # `-x64` Portable .zip name produced by `--channel osx-x64`.
        shell: bash
        run: |
          set -euo pipefail
          cd velopack-releases
          zip="Genie5-osx-x64-Portable.zip"
          [ -f "$zip" ] || { echo "::error::expected $zip from vpk pack"; exit 1; }
          work="$(mktemp -d)"; stage="$(mktemp -d)"; tmp="$(mktemp -d)"
          unzip -q "$zip" -d "$work"
          app="$(find "$work" -maxdepth 2 -name '*.app' | head -1)"
          [ -n "$app" ] || { echo "::error::no .app inside $zip"; exit 1; }
          cp -R "$app" "$stage/"
          ln -s /Applications "$stage/Applications"
          # Two-step UDRO -> UDZO (see arm64 job comment).
          hdiutil create -volname "Genie5" -srcfolder "$stage" -ov -format UDRO "$tmp/udro.dmg"
          hdiutil convert "$tmp/udro.dmg" -format UDZO -o "03-macOS-Intel-Genie5.dmg"
          echo "Built $(pwd)/03-macOS-Intel-Genie5.dmg"

      - name: Rename macOS Intel installers (numbered prefix for clarity)
        # See the Windows job's rename step for the rationale.
        run: |
          cd velopack-releases
          [ -f Genie5-osx-x64-Setup.pkg    ] && mv Genie5-osx-x64-Setup.pkg    "03-macOS-Intel-Genie5-Setup.pkg" || true
          [ -f Genie5-osx-x64-Portable.zip ] && mv Genie5-osx-x64-Portable.zip "03-macOS-Intel-Genie5-Portable.zip" || true

      - name: Download extracted release body
        uses: actions/download-artifact@v4
        with:
          name: release-body

      - name: Attach Velopack macOS x64 assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          # macOS x64 (Intel Macs, hardware up to ~2020). Separate channel
          # from osx-arm64 so the in-app updater pulls the right binary
          # for each user's CPU.
          files: velopack-releases/*
          fail_on_unmatched_files: true
          generate_release_notes: false
          body_path: RELEASE_BODY.md

  sign:
    name: Sign with SignPath Foundation
    runs-on: ubuntu-latest
    needs: publish
    # Signing is gated OFF until a trusted SignPath Foundation certificate is in
    # place. The interim self-signed test cert yields an untrusted signature, and
    # the CI trusted-build login into the SignPath org isn't enabled — so this job
    # 401s and marks every release red. The velopack jobs ship the (unsigned)
    # installers independently, so skip this chain cleanly until signing is real.
    # To turn signing back on: set repo variable ENABLE_RELEASE_SIGNING=true and
    # point SIGNPATH_SIGNING_POLICY at the Foundation (trusted) policy.
    if: vars.ENABLE_RELEASE_SIGNING == 'true'
    steps:
      - name: Submit signing request
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY }}
          # Must match the artifact configuration's SLUG in the SignPath UI.
          # SignPath auto-creates the default config with slug "initial" during
          # project setup; we kept that slug (its display Name is "genie-win-x64")
          # rather than renaming the slug on an already-validated config. The API
          # matches on the slug — the Name is cosmetic.
          artifact-configuration-slug: initial
          github-artifact-id: ${{ needs.publish.outputs.unsigned-artifact-id }}
          wait-for-completion: true      # block until a Reviewer/Approver signs it
          output-artifact-directory: signed

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: genie-win-x64-signed
          path: signed/**

  release:
    name: Attach signed binary to GitHub Release
    runs-on: ubuntu-latest
    needs: sign
    # Skips with the sign job (see above) until ENABLE_RELEASE_SIGNING=true.
    if: vars.ENABLE_RELEASE_SIGNING == 'true'
    steps:
      - name: Download signed artifact
        uses: actions/download-artifact@v4
        with:
          name: genie-win-x64-signed
          path: signed

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: signed/**
          generate_release_notes: true
          # Reminder: the Release body must mention SignPath, e.g.
          #   "Windows builds are signed via SignPath.io, certificate by the
          #    SignPath Foundation." (see README → Code signing policy)
