name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # Decide which OS matrix to run based on the trigger, to conserve the monthly
  # Actions minute budget. GitHub bills included minutes with per-OS multipliers
  # (Linux 1x, Windows 2x, macOS 10x), so running all three on every PR push
  # burns the free 2,000-minute allowance fast — macOS alone is the dominant
  # cost. Tiering:
  #   - pull_request      -> Linux only        (cheap compile sanity, 1x)
  #   - push to main      -> Linux + Windows    (validate the primary target, 2x)
  #   - push tag v*       -> Linux + Windows + macOS (full cross-platform gate at release)
  setup:
    name: Decide OS matrix
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.pick.outputs.os }}
    steps:
      - name: Pick OS matrix by event
        id: pick
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'os=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          elif [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            echo 'os=["windows-latest","ubuntu-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["windows-latest","ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    name: dotnet build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.setup.outputs.os) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Genie.slnx

      - name: Build Genie.Core (Release)
        run: dotnet build src/Genie.Core/Genie.Core.csproj -c Release --no-restore

      - name: Build Genie.App (Release)
        run: dotnet build src/Genie.App/Genie.App.csproj -c Release --no-restore

      # Build the solution (Core + App + the plugin contract assembly). The
      # loadable plugins (EXPTracker / InventoryView / SpellTimer) are
      # DELIBERATELY NOT part of this build — they live in their own standalone
      # repos under github.com/GenieClient and are validated by their own CI.
      # The Core build must never depend on them. For development they are built
      # from local clones and dropped into the Plugins folder via
      # scripts/deploy-plugins.ps1; at runtime PluginManager loads them as DLLs.
      # This step still catches a .slnx referencing a project whose files weren't
      # committed (restore would fail). --no-restore: restore already ran above.
      - name: Build solution (Release)
        run: dotnet build Genie.slnx -c Release --no-restore

      # The Profiles/ folder was silently shadowed by an over-broad
      # .gitignore rule for five days before another clone surfaced it.
      # Belt-and-braces: assert the source folders we expect to exist
      # actually do exist in the tree we just cloned. If anyone re-adds
      # an unanchored gitignore rule that shadows source, this fails fast.
      - name: Sanity-check expected source folders exist
        shell: bash
        run: |
          set -e
          required_paths=(
            "src/Genie.Core/Profiles/ConnectionProfile.cs"
            "src/Genie.Core/Profiles/ProfileStore.cs"
            "src/Genie.Core/Profiles/ProfileCrypto.cs"
            "src/Genie.Core/Mapper/AutoMapperEngine.cs"
            "src/Genie.Core/Scripting/ScriptEngine.cs"
            "src/Genie.App/Views/MainWindow.axaml"
          )
          missing=0
          for p in "${required_paths[@]}"; do
            if [ ! -f "$p" ]; then
              echo "::error::Expected source file missing: $p"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing required source file(s) missing — likely a .gitignore over-match. Check the most recent .gitignore commit."
            exit 1
          fi

  publish-smoke:
    name: dotnet publish smoke (win-x64)
    runs-on: windows-latest
    needs: build
    # Skip on PRs — the self-contained single-file publish is the heaviest step
    # (Windows runner at 2x). Runs on pushes to main and on release tags, which
    # is where a broken publish actually matters.
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained win-x64
        run: |
          dotnet publish src/Genie.App/Genie.App.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/win-x64

      - name: Confirm Genie5.exe produced
        shell: bash
        run: |
          if [ ! -f "publish/win-x64/Genie5.exe" ]; then
            echo "::error::Genie5.exe not produced — publish failed silently"
            exit 1
          fi
          size_mb=$(du -m publish/win-x64/Genie5.exe | cut -f1)
          echo "Genie5.exe: ${size_mb} MB"
          if [ "$size_mb" -gt 80 ]; then
            echo "::warning::Genie5.exe is ${size_mb} MB — drift from the ~45 MB baseline. Check for accidentally-bundled debug symbols or extra runtimes."
          fi
